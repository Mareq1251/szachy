<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS Chess AI - Fixed Modes</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <h1>Szachy JS + Bot</h1>
        <div id="board" class="board"></div>
        <div class="info-panel">
            <p id="game-status">Tura: <span id="turn-display">Białe</span></p>
            <div class="settings">
                <label>Tryb:</label>
                <select id="game-mode" onchange="initGame()">
                    <option value="pvp">Gracz vs Gracz</option>
                    <option value="pve">Gracz vs Bot (Czarne)</option>
                </select>
                <br>
                <label>Poziom bota (1-5):</label>
                <input type="range" id="difficulty" min="1" max="5" value="3" onchange="updateDiffLabel()">
                <span id="diff-label">3</span>
            </div>
            <button class="btn-reset" onclick="initGame()">Resetuj grę</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
