<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS Chess AI - Endgame Screen</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <h1>Szachy JS + Bot</h1>
        
        <div class="board-wrapper">
            <div id="board" class="board"></div>
            
            <div id="endgame-overlay" class="overlay hidden">
                <div class="overlay-content">
                    <h2 id="endgame-title">SZACH-MAT!</h2>
                    <p id="endgame-msg">Wygrywają Białe</p>
                    <button class="btn-pve" onclick="initGame()">Zagraj ponownie</button>
                </div>
            </div>
        </div>

        <div class="info-panel">
            <p id="game-status">Tura: <span id="turn-display">Białe</span></p>
            <div class="settings">
                <label>Tryb:</label>
                <select id="game-mode" onchange="initGame()">
                    <option value="pvp">Gracz vs Gracz</option>
                    <option value="pve">Gracz vs Bot (Czarne)</option>
                </select>
                <br>
                <label>Poziom bota (1-5):</label>
                <input type="range" id="difficulty" min="1" max="5" value="3" onchange="updateDiffLabel()">
                <span id="diff-label">3</span>
            </div>
            <button class="btn-reset" onclick="initGame()">Resetuj grę</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
